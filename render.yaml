services:
  - type: web
    name: pythia-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn pythia_dashboard:server --workers 1 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: DASH_DEBUG
        value: "false"
